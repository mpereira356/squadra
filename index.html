<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos da Squadra - Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-pulse-custom { animation: pulse 2s infinite; }
        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        
        /* Estilo do Escudo */
        .escudo-container {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c4a7a 50%, #1e3a5f 100%);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .escudo-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        .escudo-inner {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            position: relative;
            z-index: 1;
        }
        
        /* Estilo do Escudo com Imagem */
        .escudo-imagem {
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .escudo-imagem-texto {
            text-align: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
        }
        
        .bg-squadra { background: linear-gradient(135deg, #1e3a5f 0%, #2c4a7a 50%, #1e3a5f 100%); }
        .text-squadra { color: #fbbf24; }
        .border-squadra { border-color: #fbbf24; }
        .btn-squadra { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .btn-squadra:hover { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); transform: scale(1.02); }
        
        .pdf-report {
            font-family: 'Arial', sans-serif;
            padding: 40px;
            background: white;
        }
        .pdf-report h1 { color: #1e3a5f; font-size: 28px; margin-bottom: 10px; }
        .pdf-report h2 { color: #2c4a7a; font-size: 20px; margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid #fbbf24; padding-bottom: 5px; }
        .pdf-report .header { text-align: center; margin-bottom: 30px; }
        .pdf-report .summary-card { background: #f3f4f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .pdf-report table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .pdf-report th, .pdf-report td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .pdf-report th { background: #1e3a5f; color: white; }
        .pdf-report .positive { color: #16a34a; font-weight: bold; }
        .pdf-report .negative { color: #dc2626; font-weight: bold; }
        .pdf-report .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // ========== LISTAS PRÉ-CADASTRADAS ==========
            const MENSALISTAS_FIXOS = [
                { nome: "Andrey", telefone: "11999990001", tipo: "mensal", observacao: "" },
                { nome: "Bruno Lima", telefone: "11999990002", tipo: "mensal", observacao: "" },
                { nome: "Cicero", telefone: "11999990003", tipo: "mensal", observacao: "" },
                { nome: "Cleiber", telefone: "11999990004", tipo: "mensal", observacao: "" },
                { nome: "Eliseu", telefone: "11999990005", tipo: "mensal", observacao: "" },
                { nome: "Fabricio Hugo Souza", telefone: "11999990006", tipo: "mensal", observacao: "" },
                { nome: "Felipe", telefone: "11999990007", tipo: "mensal", observacao: "" },
                { nome: "Fernando", telefone: "11999990008", tipo: "mensal", observacao: "" },
                { nome: "Giba", telefone: "11999990009", tipo: "mensal", observacao: "" },
                { nome: "Gustavo Sorte", telefone: "11999990010", tipo: "mensal", observacao: "" },
                { nome: "Gustavo Hofmann", telefone: "11999990011", tipo: "mensal", observacao: "" },
                { nome: "Junior", telefone: "11999990012", tipo: "mensal", observacao: "" },
                { nome: "Maceió", telefone: "11999990013", tipo: "mensal", observacao: "" },
                { nome: "Marcão", telefone: "11999990014", tipo: "mensal", observacao: "" },
                { nome: "Paulinho", telefone: "11999990015", tipo: "mensal", observacao: "" },
                { nome: "Renan", telefone: "11999990016", tipo: "mensal", observacao: "" },
                { nome: "Rick Goulard", telefone: "11999990017", tipo: "mensal", observacao: "" },
                { nome: "Tito", telefone: "11999990018", tipo: "mensal", observacao: "" },
                { nome: "Vilson", telefone: "11999990019", tipo: "mensal", observacao: "" }
            ];

            const AVULSOS_CADASTRADOS = [
                { id: 1, nome: "Carlos Alberto", telefone: "11988880001", observacao: "", ativo: true },
                { id: 2, nome: "Marcelo Silva", telefone: "11988880002", observacao: "", ativo: true },
                { id: 3, nome: "Rafael Souza", telefone: "11988880003", observacao: "", ativo: true },
                { id: 4, nome: "Thiago Santos", telefone: "11988880004", observacao: "", ativo: true },
                { id: 5, nome: "Rodrigo Lima", telefone: "11988880005", observacao: "", ativo: true },
                { id: 6, nome: "André Costa", telefone: "11988880006", observacao: "", ativo: true },
                { id: 7, nome: "Luiz Fernando", telefone: "11988880007", observacao: "", ativo: true },
                { id: 8, nome: "Paulo Henrique", telefone: "11988880008", observacao: "", ativo: true },
                { id: 9, nome: "Diego Alves", telefone: "11988880009", observacao: "", ativo: true },
                { id: 10, nome: "Bruno Henrique", telefone: "11988880010", observacao: "", ativo: true }
            ];

            // ========== ESTADOS PRINCIPAIS ==========
            const [abaAtiva, setAbaAtiva] = useState("receitas");
            const [mostrarConfig, setMostrarConfig] = useState(false);
            const [mostrarRelatorio, setMostrarRelatorio] = useState(false);
            const [mostrarAvulsos, setMostrarAvulsos] = useState(false);
            const [tipoRelatorio, setTipoRelatorio] = useState("mensal");
            const [gerandoPDF, setGerandoPDF] = useState(false);
            
            const [anoSelecionado, setAnoSelecionado] = useState(new Date().getFullYear());
            const [mesSelecionado, setMesSelecionado] = useState(new Date().getMonth());
            const [jogadorEditando, setJogadorEditando] = useState(null);
            
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];

            const formatarMoeda = (valor, comSimbolo = true) => {
                const numero = Number(valor) || 0;
                const moeda = numero.toLocaleString("pt-BR", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                return comSimbolo ? `R$ ${moeda}` : moeda;
            };

            // ========== AVULSOS CADASTRADOS ==========
            const [avulsosCadastrados, setAvulsosCadastrados] = useState(() => {
                const saved = localStorage.getItem("avulsos_cadastrados");
                if (saved) return JSON.parse(saved);
                return AVULSOS_CADASTRADOS;
            });

            const [novoAvulso, setNovoAvulso] = useState({ nome: "", telefone: "", observacao: "" });
            const [conviteEnviando, setConviteEnviando] = useState(false);

            // ========== CONFIGURAÇÕES ==========
            const [configuracoes, setConfiguracoes] = useState(() => {
                const saved = localStorage.getItem("time_configuracoes");
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return {
                        ...parsed,
                        valorMensal: 0,
                        valorAvulso: 0
                    };
                }
                return {
                    valorMensal: 0,
                    valorAvulso: 0,
                    diaVencimento: 5,
                    diasAntecedencia: 5,
                    nomeTime: "Amigos da Squadra",
                    sloganTime: "UNIÃO E GARRA",
                    anoFundacao: "2023",
                    telefoneAdmin: "5511999999999",
                    pixKey: "amigosdasquadra@futebol.com",
                    dataProximoJogo: new Date(new Date().setDate(new Date().getDate() + 7)).toLocaleDateString('pt-BR'),
                    horarioJogo: "20:00",
                    localJogo: "Campo do Bairro",
                    mensagemConvite: "🏆 *CONVITE PARA JOGO - {nomeTime}* 🏆\n\nOlá {nome}! ⚽\n\nVocê está convidado para o próximo jogo!\n\n📅 Data: {dataJogo}\n⏰ Horário: {horario}\n📍 Local: {local}\n💰 Valor Avulso: R$ {valor}\n\n🔹 Chave PIX: {pixKey}\n\nConfirme sua presença! 🎉\n\n{observacao}",
                    mensagemRelatorio: "📊 *RELATÓRIO FINANCEIRO - {nomeTime}*\n\nPeríodo: {periodo}\n\n✅ *RESUMO:*\n💰 Total Recebido Mensalistas: R$ {totalMensalistas}\n💰 Total Recebido Avulsos: R$ {totalAvulsos}\n📉 Total Despesas: R$ {totalDespesas}\n💵 Saldo Final: R$ {saldo}\n\n📈 *DETALHES:*\n• Jogadores Pagos: {pagos}/{totalJogadores}\n• Percentual: {percentual}%\n\nAcesse o sistema para mais detalhes! ⚽",
                    mensagemCobranca: "Olá {nome}! 👋\n\nSua mensalidade do {nomeTime} referente a {mes} está chegando! 🏃‍♂️⚽\n\n📅 Vencimento: Dia {vencimento}\n💰 Valor: R$ {valor}\n\n🔹 Chave PIX: {pixKey}\n\nPor favor, realizar o pagamento até a data de vencimento.\n\nAgradecemos a atenção! 🙏",
                    mensagemPosJogo: "Olá {nome}! 👋\n\nObrigado por participar do jogo de {mes}! 🎉⚽\n\nValor da partida avulsa: R$ {valor}\n\n🔹 Chave PIX: {pixKey}\n\nQualquer dúvida, estamos à disposição! 💪"
                };
            });

            // ========== DADOS POR MÊS ==========
            const [dadosMensais, setDadosMensais] = useState(() => {
                const saved = localStorage.getItem("time_dados_mensais");
                if (saved) {
                    const parsed = JSON.parse(saved);
                    const normalizado = Object.fromEntries(
                        Object.entries(parsed).map(([key, dados]) => [
                            key,
                            {
                                ...dados,
                                despesas: (dados.despesas || []).map(d => ({ ...d, valor: 0 })),
                                totalRecebidoMensal: 0,
                                totalRecebidoAvulso: 0,
                                totalRecebido: 0,
                                totalDespesas: 0,
                                saldo: 0
                            }
                        ])
                    );
                    return normalizado;
                }
                
                const dadosIniciais = {};
                const anoAtual = new Date().getFullYear();
                
                for (let ano = anoAtual - 1; ano <= anoAtual + 1; ano++) {
                    for (let mes = 0; mes < 12; mes++) {
                        const key = `${ano}-${mes}`;
                        const jogadoresMes = MENSALISTAS_FIXOS.map((j, index) => ({
                            id: index + 1,
                            nome: j.nome,
                            telefone: j.telefone,
                            tipo: "mensal",
                            pago: false,
                            dataPagamento: null,
                            ultimaCobranca: null,
                            observacao: ""
                        }));
                        
                        dadosIniciais[key] = {
                            jogadores: jogadoresMes,
                            despesas: [],
                            totalRecebidoMensal: 0,
                            totalRecebidoAvulso: 0,
                            totalRecebido: 0,
                            totalDespesas: 0,
                            saldo: 0,
                            fechado: false,
                            dataFechamento: null
                        };
                    }
                }
                
                return dadosIniciais;
            });

            // ========== DADOS DO MÊS ATUAL ==========
            const currentKey = `${anoSelecionado}-${mesSelecionado}`;
            const dadosAtuais = dadosMensais[currentKey] || {
                jogadores: [],
                despesas: [],
                totalRecebidoMensal: 0,
                totalRecebidoAvulso: 0,
                totalRecebido: 0,
                totalDespesas: 0,
                saldo: 0,
                fechado: false,
                dataFechamento: null
            };

            // ========== SALVAR NO LOCALSTORAGE ==========
            useEffect(() => {
                localStorage.setItem("time_dados_mensais", JSON.stringify(dadosMensais));
            }, [dadosMensais]);

            useEffect(() => {
                localStorage.setItem("time_configuracoes", JSON.stringify(configuracoes));
            }, [configuracoes]);

            useEffect(() => {
                localStorage.setItem("avulsos_cadastrados", JSON.stringify(avulsosCadastrados));
            }, [avulsosCadastrados]);

            // ========== ATUALIZAR TOTAIS ==========
            useEffect(() => {
                if (dadosAtuais.jogadores) {
                    let totalMensal = 0;
                    let totalAvulso = 0;
                    
                    dadosAtuais.jogadores.forEach(j => {
                        if (j.pago) {
                            if (j.tipo === "mensal") totalMensal += configuracoes.valorMensal;
                            else totalAvulso += configuracoes.valorAvulso;
                        }
                    });
                    
                    const totalRecebido = totalMensal + totalAvulso;
                    const totalDespesas = dadosAtuais.despesas?.reduce((acc, d) => acc + (d.pago ? d.valor : 0), 0) || 0;
                    const saldo = totalRecebido - totalDespesas;
                    
                    setDadosMensais(prev => ({
                        ...prev,
                        [currentKey]: {
                            ...prev[currentKey],
                            totalRecebidoMensal: totalMensal,
                            totalRecebidoAvulso: totalAvulso,
                            totalRecebido,
                            totalDespesas,
                            saldo
                        }
                    }));
                }
            }, [dadosAtuais.jogadores, dadosAtuais.despesas, currentKey, configuracoes.valorMensal, configuracoes.valorAvulso]);

            // ========== FUNÇÕES DE EDIÇÃO ==========
            const editarJogador = (jogador) => {
                setJogadorEditando(jogador);
            };

            const salvarEdicaoJogador = (id, campo, valor) => {
                const lista = dadosAtuais.jogadores.map(j =>
                    j.id === id ? { ...j, [campo]: valor } : j
                );
                setDadosMensais(prev => ({
                    ...prev,
                    [currentKey]: { ...prev[currentKey], jogadores: lista }
                }));
                setJogadorEditando(null);
                showMessage(`✅ Informações atualizadas!`);
            };

            // ========== FUNÇÕES DE AVULSOS CADASTRADOS ==========
            const adicionarAvulsoCadastrado = () => {
                if (!novoAvulso.nome.trim()) {
                    showMessage("⚠️ Informe o nome do jogador avulso", "error");
                    return;
                }
                if (!novoAvulso.telefone.trim()) {
                    showMessage("⚠️ Informe o telefone do jogador avulso", "error");
                    return;
                }
                
                const novoId = Math.max(...avulsosCadastrados.map(a => a.id), 0) + 1;
                const avulso = {
                    id: novoId,
                    nome: novoAvulso.nome.trim(),
                    telefone: novoAvulso.telefone.trim(),
                    observacao: novoAvulso.observacao,
                    ativo: true
                };
                setAvulsosCadastrados([...avulsosCadastrados, avulso]);
                setNovoAvulso({ nome: "", telefone: "", observacao: "" });
                showMessage(`✅ ${avulso.nome} adicionado aos avulsos cadastrados!`);
            };

            const removerAvulsoCadastrado = (id) => {
                if (window.confirm(`Remover este jogador da lista de avulsos?`)) {
                    setAvulsosCadastrados(avulsosCadastrados.filter(a => a.id !== id));
                    showMessage(`🗑️ Removido da lista de avulsos`);
                }
            };

            const editarAvulsoCadastrado = (avulso) => {
                const novoNome = prompt("Novo nome:", avulso.nome);
                const novoTelefone = prompt("Novo telefone:", avulso.telefone);
                if (novoNome && novoTelefone) {
                    setAvulsosCadastrados(avulsosCadastrados.map(a => 
                        a.id === avulso.id ? { ...a, nome: novoNome, telefone: novoTelefone } : a
                    ));
                    showMessage(`✅ Informações do avulso atualizadas!`);
                }
            };

            const enviarConviteWhatsApp = (avulso) => {
                if (!avulso.telefone) {
                    showMessage(`⚠️ ${avulso.nome} não tem telefone cadastrado!`, "error");
                    return;
                }
                
                const mensagem = configuracoes.mensagemConvite
                    .replace(/{nomeTime}/g, configuracoes.nomeTime)
                    .replace(/{nome}/g, avulso.nome)
                    .replace(/{dataJogo}/g, configuracoes.dataProximoJogo)
                    .replace(/{horario}/g, configuracoes.horarioJogo)
                    .replace(/{local}/g, configuracoes.localJogo)
                    .replace(/{valor}/g, formatarMoeda(configuracoes.valorAvulso, false))
                    .replace(/{pixKey}/g, configuracoes.pixKey)
                    .replace(/{observacao}/g, avulso.observacao || "");
                
                const telefoneFormatado = formatarTelefone(avulso.telefone);
                const url = `https://wa.me/${telefoneFormatado}?text=${encodeURIComponent(mensagem)}`;
                window.open(url, '_blank');
                showMessage(`📱 Convite enviado para ${avulso.nome}!`);
            };

            const enviarConviteEmLote = () => {
                const avulsosAtivos = avulsosCadastrados.filter(a => a.ativo && a.telefone);
                if (avulsosAtivos.length === 0) {
                    showMessage(`⚠️ Nenhum avulso ativo com telefone cadastrado!`, "error");
                    return;
                }
                
                setConviteEnviando(true);
                avulsosAtivos.forEach((avulso, index) => {
                    setTimeout(() => {
                        const mensagem = configuracoes.mensagemConvite
                            .replace(/{nomeTime}/g, configuracoes.nomeTime)
                            .replace(/{nome}/g, avulso.nome)
                            .replace(/{dataJogo}/g, configuracoes.dataProximoJogo)
                            .replace(/{horario}/g, configuracoes.horarioJogo)
                            .replace(/{local}/g, configuracoes.localJogo)
                            .replace(/{valor}/g, formatarMoeda(configuracoes.valorAvulso, false))
                            .replace(/{pixKey}/g, configuracoes.pixKey)
                            .replace(/{observacao}/g, avulso.observacao || "");
                        
                        const telefoneFormatado = formatarTelefone(avulso.telefone);
                        const url = `https://wa.me/${telefoneFormatado}?text=${encodeURIComponent(mensagem)}`;
                        window.open(url, '_blank');
                        
                        if (index === avulsosAtivos.length - 1) {
                            setTimeout(() => {
                                setConviteEnviando(false);
                                showMessage(`✅ ${avulsosAtivos.length} convites enviados!`);
                            }, 2000);
                        }
                    }, index * 2000);
                });
            };

            // ========== FUNÇÕES DE RECEITAS ==========
            const adicionarJogador = (jogadorPreCadastrado = null) => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado!`, "error");
                    return;
                }
                
                let novoJogador;
                if (jogadorPreCadastrado) {
                    if (dadosAtuais.jogadores.some(j => j.nome === jogadorPreCadastrado.nome)) {
                        showMessage(`❌ ${jogadorPreCadastrado.nome} já está na lista!`, "error");
                        return;
                    }
                    novoJogador = {
                        id: Date.now(),
                        nome: jogadorPreCadastrado.nome,
                        telefone: jogadorPreCadastrado.telefone,
                        tipo: jogadorPreCadastrado.tipo || "mensal",
                        pago: false,
                        dataPagamento: null,
                        ultimaCobranca: null,
                        observacao: ""
                    };
                } else {
                    if (!nome.trim()) {
                        showMessage("⚠️ Informe o nome do jogador", "error");
                        return;
                    }
                    novoJogador = {
                        id: Date.now(),
                        nome: nome.trim(),
                        telefone: telefone.trim(),
                        tipo,
                        pago: false,
                        dataPagamento: null,
                        ultimaCobranca: null,
                        observacao: ""
                    };
                }
                
                setDadosMensais(prev => ({
                    ...prev,
                    [currentKey]: {
                        ...prev[currentKey],
                        jogadores: [...(prev[currentKey]?.jogadores || []), novoJogador]
                    }
                }));
                
                setNome("");
                setTelefone("");
                showMessage(`✅ ${novoJogador.nome} adicionado!`);
            };

            const adicionarTodosMensalistas = () => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado!`, "error");
                    return;
                }
                
                let adicionados = 0;
                MENSALISTAS_FIXOS.forEach(mensalista => {
                    if (!dadosAtuais.jogadores.some(j => j.nome === mensalista.nome)) {
                        const novoJogador = {
                            id: Date.now() + adicionados,
                            nome: mensalista.nome,
                            telefone: mensalista.telefone,
                            tipo: "mensal",
                            pago: false,
                            dataPagamento: null,
                            ultimaCobranca: null,
                            observacao: ""
                        };
                        setDadosMensais(prev => ({
                            ...prev,
                            [currentKey]: {
                                ...prev[currentKey],

                                </div>
                            </div>

                    </div>

                            <div>

                                <input type="text" value={configuracoes.nomeTime} onChange={(e) => setConfiguracoes({...configuracoes, nomeTime: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm mb-1">Valor Mensal (R$)</label>
                                    <input type="number" value={configuracoes.valorMensal} onChange={(e) => setConfiguracoes({...configuracoes, valorMensal: 0})} className="w-full px-4 py-2 border rounded-lg" />
                                </div>
                                <div>
                                    <label className="block text-sm mb-1">Valor Avulso (R$)</label>
                                    <input type="number" value={configuracoes.valorAvulso} onChange={(e) => setConfiguracoes({...configuracoes, valorAvulso: 0})} className="w-full px-4 py-2 border rounded-lg" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm mb-1">Dia Vencimento</label>
                                    <input type="number" value={configuracoes.diaVencimento} onChange={(e) => setConfiguracoes({...configuracoes, diaVencimento: parseInt(e.target.value)})} className="w-full px-4 py-2 border rounded-lg" />
                                </div>
                                <div>
                                    <label className="block text-sm mb-1">Telefone Admin</label>
                                    <input type="text" value={configuracoes.telefoneAdmin} onChange={(e) => setConfiguracoes({...configuracoes, telefoneAdmin: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />
                                </div>
                            </div>
                            <div className="border-t pt-4">
                                <h3 className="font-semibold mb-3 text-squadra">📅 Configurações do Próximo Jogo</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm mb-1">Data do Próximo Jogo</label>
                                        <input type="date" value={configuracoes.dataProximoJogo} onChange={(e) => setConfiguracoes({...configuracoes, dataProximoJogo: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">Horário</label>
                                        <input type="time" value={configuracoes.horarioJogo} onChange={(e) => setConfiguracoes({...configuracoes, horarioJogo: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-sm mb-1">Local do Jogo</label>
                                        <input type="text" value={configuracoes.localJogo} onChange={(e) => setConfiguracoes({...configuracoes, localJogo: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm mb-1">Chave PIX</label>
                                <input type="text" value={configuracoes.pixKey} onChange={(e) => setConfiguracoes({...configuracoes, pixKey: e.target.value})} className="w-full px-4 py-2 border rounded-lg" />
                            </div>
                            <div>
                                <label className="block text-sm mb-1">Mensagem de Convite</label>
                                <textarea rows="4" value={configuracoes.mensagemConvite} onChange={(e) => setConfiguracoes({...configuracoes, mensagemConvite: e.target.value})} className="w-full px-4 py-2 border rounded-lg text-sm" />
                                <p className="text-xs text-gray-400 mt-1">Variáveis: {`{nome}`, `{nomeTime}`, `{dataJogo}`, `{horario}`, `{local}`, `{valor}`, `{pixKey}`, `{observacao}`}</p>
                            </div>
                            <button onClick={() => { setMostrarConfig(false); showMessage("✅ Configurações salvas!"); }} className="w-full py-3 btn-squadra text-white rounded-lg font-semibold">
                                Salvar
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-yellow-50">
                    <div className="max-w-7xl mx-auto p-4 md:p-6">
                        {/* Header com Escudo - IMAGEM REAL */}
                        <div className="text-center mb-8 animate-slide-in">
                            <div className="escudo-container w-36 h-36 mx-auto rounded-full flex items-center justify-center mb-4 relative">
                                <div className="escudo-inner w-32 h-32 rounded-full flex flex-col items-center justify-center p-2">
                                    <img
                                        src="logo.png"
                                        alt="Logo Amigos da Squadra"
                                        className="w-full h-full object-contain"
                                    />
                                </div>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-bold text-squadra">
                                {configuracoes.nomeTime}
                            </h1>
                            <p className="text-yellow-600 font-semibold">{configuracoes.sloganTime}</p>
                            <p className="text-gray-400 text-sm">Est. {configuracoes.anoFundacao}</p>
                        </div>

                        {/* Barra de ferramentas */}
                        <div className="flex flex-wrap justify-between items-center gap-4 mb-6">
                            <div className="flex gap-2">
                                <button onClick={() => setMostrarConfig(true)} className="px-4 py-2 bg-gray-800 text-white rounded-lg">⚙️</button>

                                <button onClick={() => setMostrarAvulsos(true)} className="px-4 py-2 bg-purple-600 text-white rounded-lg">👥 Avulsos</button>
                            </div>
                            <div className="flex items-center gap-4 bg-white rounded-lg shadow p-2">
                                <button onClick={() => {

                                    if (novoMes < 0) { novoMes = 11; novoAno--; }

                                    setAnoSelecionado(novoAno);

                                <select value={anoSelecionado} onChange={(e) => setAnoSelecionado(parseInt(e.target.value))} className="px-3 py-1 border rounded">

                                </select>
                                <select value={mesSelecionado} onChange={(e) => setMesSelecionado(parseInt(e.target.value))} className="px-3 py-1 border rounded">
                                    {meses.map((mes, idx) => <option key={idx} value={idx}>{mes}</option>)}
                                </select>
                                <button onClick={() => {
                                    let novoMes = mesSelecionado + 1;
                                    let novoAno = anoSelecionado;
                                    if (novoMes > 11) { novoMes = 0; novoAno++; }
                                    setMesSelecionado(novoMes);
                                    setAnoSelecionado(novoAno);
                                }} className="px-3 py-1 bg-gray-200 rounded-lg">▶</button>
                            </div>
                        </div>

                        {/* Status do Mês */}
                        <div className={`mb-6 p-3 rounded-lg text-center ${dadosAtuais.fechado ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                            {dadosAtuais.fechado ? `🔒 Mês FECHADO - ${meses[mesSelecionado]}/${anoSelecionado}` : `📝 Mês ABERTO - ${meses[mesSelecionado]}/${anoSelecionado}`}
                            {!dadosAtuais.fechado && dadosAtuais.jogadores?.length === 0 && (
                                <button onClick={adicionarTodosMensalistas} className="ml-4 px-3 py-1 bg-blue-500 text-white rounded text-sm">
                                    📋 Carregar Mensalistas
                                </button>
                            )}
                        </div>

                        {/* Cards de Resumo */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                            <div className="bg-white rounded-2xl shadow-lg p-6 border-l-4 border-green-500 card-hover">
                                <p className="text-gray-500 text-sm">💰 Mensalistas Pagos</p>
                                <p className="text-2xl font-bold text-green-600">{formatarMoeda(totalRecebidoMensal)}</p>
                            </div>
                            <div className="bg-white rounded-2xl shadow-lg p-6 border-l-4 border-blue-500 card-hover">
                                <p className="text-gray-500 text-sm">💰 Avulsos Pagos</p>
                                <p className="text-2xl font-bold text-blue-600">{formatarMoeda(totalRecebidoAvulso)}</p>
                            </div>
                            <div className="bg-white rounded-2xl shadow-lg p-6 border-l-4 border-red-500 card-hover">
                                <p className="text-gray-500 text-sm">📉 Despesas</p>
                                <p className="text-2xl font-bold text-red-600">{formatarMoeda(totalDespesas)}</p>
                            </div>
                            <div className="bg-white rounded-2xl shadow-lg p-6 border-l-4 border-yellow-500 card-hover">
                                <p className="text-gray-500 text-sm">💵 A Receber</p>
                                <p className="text-2xl font-bold text-yellow-600">{formatarMoeda(totalReceber - totalRecebido)}</p>
                            </div>
                            <div className={`bg-white rounded-2xl shadow-lg p-6 border-l-4 ${saldoFinal >= 0 ? 'border-purple-500' : 'border-orange-500'} card-hover`}>
                                <p className="text-gray-500 text-sm">💵 Saldo</p>
                                <p className={`text-2xl font-bold ${saldoFinal >= 0 ? 'text-purple-600' : 'text-orange-600'}`}>{formatarMoeda(saldoFinal)}</p>
                            </div>
                        </div>

                        {/* Mensagem de feedback */}
                        {mensagem.show && (
                            <div className={`mb-6 p-4 rounded-lg animate-slide-in ${mensagem.type === "error" ? "bg-red-50 border-red-200 text-red-700" : "bg-green-50 border-green-200 text-green-700"}`}>
                                {mensagem.text}
                            </div>
                        )}

                        {/* Abas */}
                        <div className="flex gap-2 mb-6 border-b border-gray-200">
                            <button onClick={() => setAbaAtiva("receitas")} className={`px-6 py-3 rounded-t-lg font-semibold transition-all ${abaAtiva === "receitas" ? "bg-squadra text-white" : "bg-gray-100"}`}>📊 Receitas</button>
                            <button onClick={() => setAbaAtiva("despesas")} className={`px-6 py-3 rounded-t-lg font-semibold transition-all ${abaAtiva === "despesas" ? "bg-squadra text-white" : "bg-gray-100"}`}>💸 Despesas</button>
                        </div>

                        {/* Conteúdo Receitas */}
                        {abaAtiva === "receitas" && (
                            <>
                                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8 card-hover">
                                    <h2 className="text-xl font-semibold mb-4 text-squadra">➕ Adicionar Jogador</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                        <input type="text" placeholder="Nome" value={nome} onChange={(e) => setNome(e.target.value)} className="px-4 py-2 border rounded-lg focus:outline-none focus:border-yellow-400" disabled={dadosAtuais.fechado} />
                                        <input type="text" placeholder="Telefone (WhatsApp)" value={telefone} onChange={(e) => setTelefone(e.target.value)} className="px-4 py-2 border rounded-lg focus:outline-none focus:border-yellow-400" disabled={dadosAtuais.fechado} />
                                        <select value={tipo} onChange={(e) => setTipo(e.target.value)} className="px-4 py-2 border rounded-lg" disabled={dadosAtuais.fechado}>
                                            <option value="mensal">Mensalista - {formatarMoeda(configuracoes.valorMensal)}</option>
                                            <option value="avulso">Avulso - {formatarMoeda(configuracoes.valorAvulso)}</option>
                                        </select>
                                        <button onClick={adicionarJogador} disabled={dadosAtuais.fechado} className="md:col-span-3 px-6 py-2 btn-squadra text-white rounded-lg disabled:opacity-50 font-semibold">Adicionar Jogador</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8">

                                            <button onClick={() => setFiltro("todos")} className={`px-3 py-1 rounded ${filtro === "todos" ? "bg-squadra text-white" : "bg-gray-100"}`}>Todos ({dadosAtuais.jogadores?.length || 0})</button>

                                </div>

                                <div className="bg-white rounded-2xl shadow-lg overflow-hidden">
                                    <div className="bg-squadra px-6 py-4">

                                    </div>
                                    <div className="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                                        {jogadoresFiltrados.length === 0 ? (
                                            <div className="text-center py-12">

                                            </div>

                                                <div key={j.id} className="p-4 hover:bg-gray-50 transition-colors">
                                                    <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className="font-semibold text-gray-800">{j.nome}</span>
                                                                <span className={`text-xs px-2 py-1 rounded-full ${j.tipo === "mensal" ? "bg-blue-100 text-blue-700" : "bg-purple-100 text-purple-700"}`}>
                                                                    {j.tipo === "mensal" ? "Mensalista" : "Avulso"}
                                                                </span>
                                                                <span className="text-sm text-gray-600">
                                                                    {formatarMoeda(j.tipo === "mensal" ? configuracoes.valorMensal : configuracoes.valorAvulso)}
                                                                </span>
                                                                {j.telefone ? (
                                                                    <span className="text-xs text-green-600">📱 {j.telefone}</span>

                                                                {j.dataPagamento && (
                                                                    <span className="text-xs text-gray-400">🗓️ Pago em {j.dataPagamento}</span>
                                                                )}
                                                                {j.observacao && (
                                                                    <span className="text-xs text-orange-500">📝 {j.observacao}</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => editarJogador(j)} className="px-3 py-1 bg-yellow-500 text-white rounded text-sm">✏️ Editar</button>
                                                            <button onClick={() => removerJogador(j.id)} disabled={dadosAtuais.fechado} className="px-3 py-1 bg-red-500 text-white rounded text-sm disabled:opacity-50">🗑️</button>
                                                            {!j.pago && j.tipo === "mensal" && (
                                                                <button onClick={() => enviarCobrancaMensal(j)} className="px-3 py-1 bg-green-500 text-white rounded text-sm">📱 Cobrar</button>

                                                                <button onClick={() => enviarCobrancaAvulso(j)} className="px-3 py-1 bg-orange-500 text-white rounded text-sm">📱 Cobrar</button>

                                                                {j.pago ? "✅ Pago" : "⏳ Pendente"}

                                        <select value={novaDespesa.categoria} onChange={(e) => setNovaDespesa({...novaDespesa, categoria: e.target.value})} className="px-4 py-2 border rounded-lg" disabled={dadosAtuais.fechado}>
                                            <option value="estrutura">🏟️ Locação da Quadra</option>
                                            <option value="serviços">🧤 Goleiro</option>
                                            <option value="manutenção">👕 Lavagem Uniforme</option>
                                            <option value="outros">📝 Outros</option>
                                        </select>

                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8">
                                    <div className="flex gap-2">
                                        <button onClick={() => setFiltroDespesa("todas")} className={`px-3 py-1 rounded ${filtroDespesa === "todas" ? "bg-squadra text-white" : "bg-gray-100"}`}>Todas</button>
                                        <button onClick={() => setFiltroDespesa("pagas")} className={`px-3 py-1 rounded ${filtroDespesa === "pagas" ? "bg-green-600 text-white" : "bg-gray-100"}`}>Pagas</button>
                                        <button onClick={() => setFiltroDespesa("pendentes")} className={`px-3 py-1 rounded ${filtroDespesa === "pendentes" ? "bg-orange-600 text-white" : "bg-gray-100"}`}>Pendentes</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg overflow-hidden">
                                    <div className="bg-squadra px-6 py-4">
                                        <h2 className="text-xl font-semibold text-white">📋 Despesas</h2>
                                    </div>
                                    <div className="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                                        {despesasFiltradas.length === 0 ? (
                                            <div className="text-center py-12"><p className="text-gray-400">Nenhuma despesa cadastrada</p></div>
                                        ) : (
                                            despesasFiltradas.map((d) => (
                                                <div key={d.id} className="p-4 hover:bg-gray-50">
                                                    <div className="flex justify-between items-center flex-wrap gap-2">
                                                        <div>
                                                            <span className="font-semibold">{d.nome}</span>
                                                            <span className="text-xs ml-2 px-2 py-1 rounded-full bg-gray-100">{categorias[d.categoria]}</span>
                                                            <span className="text-sm ml-2 text-red-600 font-bold">{formatarMoeda(d.valor)}</span>
                                                            {d.dataPagamento && <span className="text-xs ml-2 text-green-600">✅ Paga em {d.dataPagamento}</span>}
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => removerDespesa(d.id)} disabled={dadosAtuais.fechado} className="px-3 py-1 bg-red-500 text-white rounded text-sm disabled:opacity-50">🗑️</button>
                                                            <button onClick={() => togglePagamentoDespesa(d.id)} disabled={dadosAtuais.fechado} className={`px-3 py-1 rounded text-sm ${d.pago ? "bg-green-500 text-white" : "bg-gray-200"} disabled:opacity-50`}>
                                                                {d.pago ? "✅ Paga" : "⏳ Pendente"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </>
                        )}

                        <div className="mt-8 text-center text-sm text-gray-400">
                            <p>💡 Dados salvos automaticamente | 📊 Gere relatórios em PDF | 📱 Compartilhe via WhatsApp</p>
                            <p className="mt-1">👥 {MENSALISTAS_FIXOS.length} Mensalistas Fixos | {avulsosCadastrados.length} Avulsos Cadastrados</p>
                            <p className="mt-1 text-yellow-600">🏆 {configuracoes.nomeTime} - {configuracoes.sloganTime} - Est. {configuracoes.anoFundacao}</p>
                        </div>
                    </div>

                    {jogadorEditando && <ModalEdicao jogador={jogadorEditando} onClose={() => setJogadorEditando(null)} />}
                    {mostrarConfig && <ModalConfiguracoes />}
                    {mostrarRelatorio && <ModalRelatorio />}
                    {mostrarAvulsos && <ModalAvulsosCadastrados />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
