<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão do Time - Controle Financeiro Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .animate-pulse-custom { animation: pulse 2s infinite; }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .pdf-report { font-family: 'Arial', sans-serif; padding: 40px; background: white; }
        .pdf-report h1 { color: #1e40af; font-size: 28px; margin-bottom: 10px; }
        .pdf-report h2 { color: #1e3a8a; font-size: 20px; margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid #3b82f6; padding-bottom: 5px; }
        .pdf-report .header { text-align: center; margin-bottom: 30px; }
        .pdf-report .summary-card { background: #f3f4f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .pdf-report table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .pdf-report th, .pdf-report td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .pdf-report th { background: #3b82f6; color: white; }
        .pdf-report .positive { color: #16a34a; font-weight: bold; }
        .pdf-report .negative { color: #dc2626; font-weight: bold; }
        .pdf-report .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // ========== LISTAS PRÉ-CADASTRADAS ==========
            const MENSALISTAS_FIXOS = [
                { nome: "Andrey", telefone: "11999990001", tipo: "mensal" },
                { nome: "Bruno Lima", telefone: "11999990002", tipo: "mensal" },
                { nome: "Cicero", telefone: "11999990003", tipo: "mensal" },
                { nome: "Cleiber", telefone: "11999990004", tipo: "mensal" },
                { nome: "Eliseu", telefone: "11999990005", tipo: "mensal" },
                { nome: "Fabricio Hugo Souza", telefone: "11999990006", tipo: "mensal" },
                { nome: "Felipe", telefone: "11999990007", tipo: "mensal" },
                { nome: "Fernando", telefone: "11999990008", tipo: "mensal" },
                { nome: "Giba", telefone: "11999990009", tipo: "mensal" },
                { nome: "Gustavo Sorte", telefone: "11999990010", tipo: "mensal" },
                { nome: "Gustavo Hofmann", telefone: "11999990011", tipo: "mensal" },
                { nome: "Junior", telefone: "11999990012", tipo: "mensal" },
                { nome: "Maceió", telefone: "11999990013", tipo: "mensal" },
                { nome: "Marcão", telefone: "11999990014", tipo: "mensal" },
                { nome: "Paulinho", telefone: "11999990015", tipo: "mensal" },
                { nome: "Renan", telefone: "11999990016", tipo: "mensal" },
                { nome: "Rick Goulard", telefone: "11999990017", tipo: "mensal" },
                { nome: "Tito", telefone: "11999990018", tipo: "mensal" },
                { nome: "Vilson", telefone: "11999990019", tipo: "mensal" }
            ];

            const AVULSOS_ROTINEIROS = [
                { nome: "Carlos Alberto", telefone: "11988880001", tipo: "avulso" },
                { nome: "Marcelo Silva", telefone: "11988880002", tipo: "avulso" },
                { nome: "Rafael Souza", telefone: "11988880003", tipo: "avulso" },
                { nome: "Thiago Santos", telefone: "11988880004", tipo: "avulso" },
                { nome: "Rodrigo Lima", telefone: "11988880005", tipo: "avulso" },
                { nome: "André Costa", telefone: "11988880006", tipo: "avulso" },
                { nome: "Luiz Fernando", telefone: "11988880007", tipo: "avulso" },
                { nome: "Paulo Henrique", telefone: "11988880008", tipo: "avulso" },
                { nome: "Diego Alves", telefone: "11988880009", tipo: "avulso" },
                { nome: "Bruno Henrique", telefone: "11988880010", tipo: "avulso" }
            ];

            const TODOS_JOGADORES = [...MENSALISTAS_FIXOS, ...AVULSOS_ROTINEIROS];

            // ========== ESTADOS PRINCIPAIS ==========
            const [abaAtiva, setAbaAtiva] = useState("receitas");
            const [mostrarConfig, setMostrarConfig] = useState(false);
            const [mostrarRelatorio, setMostrarRelatorio] = useState(false);
            const [tipoRelatorio, setTipoRelatorio] = useState("mensal");
            const [dataInicio, setDataInicio] = useState("");
            const [dataFim, setDataFim] = useState("");
            const [gerandoPDF, setGerandoPDF] = useState(false);
            
            const [anoSelecionado, setAnoSelecionado] = useState(new Date().getFullYear());
            const [mesSelecionado, setMesSelecionado] = useState(new Date().getMonth());
            
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];

            const reportRef = useRef(null);

            // ========== CONFIGURAÇÕES ==========
            const [configuracoes, setConfiguracoes] = useState(() => {
                const saved = localStorage.getItem("time_configuracoes");
                if (saved) return JSON.parse(saved);
                return {
                    valorMensal: 65,
                    valorAvulso: 30,
                    diaVencimento: 5,
                    diasAntecedencia: 5,
                    nomeTime: "Futebol Clube",
                    telefoneAdmin: "5511999999999",
                    pixKey: "time@futebol.com",
                    mensagemRelatorio: "📊 *RELATÓRIO FINANCEIRO - {nomeTime}*\n\nPeríodo: {periodo}\n\n✅ *RESUMO:*\n💰 Total Recebido: R$ {totalRecebido}\n📉 Total Despesas: R$ {totalDespesas}\n💵 Saldo Final: R$ {saldo}\n\n📈 *DETALHES:*\n• Jogadores Pagos: {pagos}/{totalJogadores}\n• Percentual: {percentual}%\n\nAcesse o sistema para mais detalhes! ⚽",
                    mensagemCobranca: "Olá {nome}! 👋\n\nSua mensalidade do {nomeTime} referente a {mes} está chegando! 🏃‍♂️⚽\n\n📅 Vencimento: Dia {vencimento}\n💰 Valor: R$ {valor}\n\n🔹 Chave PIX: {pixKey}\n\nPor favor, realizar o pagamento até a data de vencimento.\n\nAgradecemos a atenção! 🙏",
                    mensagemPosJogo: "Olá {nome}! 👋\n\nObrigado por participar do jogo de {mes}! 🎉⚽\n\nValor da partida avulsa: R$ {valor}\n\n🔹 Chave PIX: {pixKey}\n\nQualquer dúvida, estamos à disposição! 💪"
                };
            });

            // ========== DADOS POR MÊS ==========
            const [dadosMensais, setDadosMensais] = useState(() => {
                const saved = localStorage.getItem("time_dados_mensais");
                if (saved) return JSON.parse(saved);
                
                const dadosIniciais = {};
                const anoAtual = new Date().getFullYear();
                
                for (let ano = anoAtual - 1; ano <= anoAtual + 1; ano++) {
                    for (let mes = 0; mes < 12; mes++) {
                        const key = `${ano}-${mes}`;
                        // Criar cópia dos jogadores para cada mês
                        const jogadoresMes = TODOS_JOGADORES.map((j, index) => ({
                            id: index + 1,
                            nome: j.nome,
                            telefone: j.telefone,
                            tipo: j.tipo,
                            pago: false,
                            dataPagamento: null,
                            ultimaCobranca: null
                        }));
                        
                        dadosIniciais[key] = {
                            jogadores: jogadoresMes,
                            despesas: [],
                            totalRecebido: 0,
                            totalDespesas: 0,
                            saldo: 0,
                            fechado: false,
                            dataFechamento: null
                        };
                    }
                }
                
                return dadosIniciais;
            });

            // ========== DADOS DO MÊS ATUAL ==========
            const currentKey = `${anoSelecionado}-${mesSelecionado}`;
            const dadosAtuais = dadosMensais[currentKey] || {
                jogadores: [],
                despesas: [],
                totalRecebido: 0,
                totalDespesas: 0,
                saldo: 0,
                fechado: false,
                dataFechamento: null
            };

            // ========== SALVAR NO LOCALSTORAGE ==========
            useEffect(() => {
                localStorage.setItem("time_dados_mensais", JSON.stringify(dadosMensais));
            }, [dadosMensais]);

            useEffect(() => {
                localStorage.setItem("time_configuracoes", JSON.stringify(configuracoes));
            }, [configuracoes]);

            // ========== FUNÇÕES DO RELATÓRIO ==========
            const gerarRelatorio = () => {
                let dadosRelatorio = {
                    periodo: "",
                    totalRecebido: 0,
                    totalDespesas: 0,
                    saldo: 0,
                    jogadoresPagos: 0,
                    totalJogadores: 0,
                    percentualPagos: 0,
                    despesasPorCategoria: {},
                    jogadoresPorTipo: { mensal: 0, avulso: 0 },
                    pagosPorTipo: { mensal: 0, avulso: 0 },
                    topDespesas: [],
                    inadimplentes: []
                };

                if (tipoRelatorio === "mensal") {
                    const dados = dadosMensais[`${anoSelecionado}-${mesSelecionado}`];
                    if (dados) {
                        dadosRelatorio.periodo = `${meses[mesSelecionado]} de ${anoSelecionado}`;
                        dadosRelatorio.totalRecebido = dados.totalRecebido || 0;
                        dadosRelatorio.totalDespesas = dados.totalDespesas || 0;
                        dadosRelatorio.saldo = (dados.totalRecebido || 0) - (dados.totalDespesas || 0);
                        
                        if (dados.jogadores) {
                            dadosRelatorio.totalJogadores = dados.jogadores.length;
                            dadosRelatorio.jogadoresPagos = dados.jogadores.filter(j => j.pago).length;
                            dadosRelatorio.percentualPagos = (dadosRelatorio.jogadoresPagos / dadosRelatorio.totalJogadores) * 100;
                            
                            dadosRelatorio.jogadoresPorTipo.mensal = dados.jogadores.filter(j => j.tipo === "mensal").length;
                            dadosRelatorio.jogadoresPorTipo.avulso = dados.jogadores.filter(j => j.tipo === "avulso").length;
                            
                            dadosRelatorio.pagosPorTipo.mensal = dados.jogadores.filter(j => j.tipo === "mensal" && j.pago).length;
                            dadosRelatorio.pagosPorTipo.avulso = dados.jogadores.filter(j => j.tipo === "avulso" && j.pago).length;
                            
                            dadosRelatorio.inadimplentes = dados.jogadores.filter(j => !j.pago).map(j => j.nome);
                        }
                        
                        if (dados.despesas) {
                            dados.despesas.forEach(d => {
                                if (!dadosRelatorio.despesasPorCategoria[d.categoria]) {
                                    dadosRelatorio.despesasPorCategoria[d.categoria] = 0;
                                }
                                dadosRelatorio.despesasPorCategoria[d.categoria] += d.valor;
                            });
                            dadosRelatorio.topDespesas = [...dados.despesas].sort((a,b) => b.valor - a.valor).slice(0,5);
                        }
                    }
                } else if (tipoRelatorio === "anual") {
                    dadosRelatorio.periodo = `Ano ${anoSelecionado}`;
                    let mesesComDados = 0;
                    
                    for (let mes = 0; mes < 12; mes++) {
                        const key = `${anoSelecionado}-${mes}`;
                        const dados = dadosMensais[key];
                        if (dados && (dados.totalRecebido > 0 || dados.totalDespesas > 0)) {
                            mesesComDados++;
                            dadosRelatorio.totalRecebido += dados.totalRecebido || 0;
                            dadosRelatorio.totalDespesas += dados.totalDespesas || 0;
                            
                            if (dados.jogadores && mes === new Date().getMonth()) {
                                dadosRelatorio.totalJogadores = dados.jogadores.length;
                                dadosRelatorio.jogadoresPagos = dados.jogadores.filter(j => j.pago).length;
                            }
                        }
                    }
                    
                    dadosRelatorio.saldo = dadosRelatorio.totalRecebido - dadosRelatorio.totalDespesas;
                    dadosRelatorio.percentualPagos = dadosRelatorio.totalJogadores > 0 ? (dadosRelatorio.jogadoresPagos / dadosRelatorio.totalJogadores) * 100 : 0;
                }

                return dadosRelatorio;
            };

            const exportarPDF = async () => {
                setGerandoPDF(true);
                const dados = gerarRelatorio();
                
                const element = document.createElement('div');
                element.innerHTML = `
                    <div class="pdf-report">
                        <div class="header">
                            <div style="font-size: 48px; margin-bottom: 10px;">⚽</div>
                            <h1>${configuracoes.nomeTime}</h1>
                            <h2>RELATÓRIO FINANCEIRO</h2>
                            <p style="color: #6b7280;">Período: ${dados.periodo}</p>
                            <p style="color: #6b7280;">Gerado em: ${new Date().toLocaleString()}</p>
                        </div>
                        
                        <div class="summary-card">
                            <h3 style="margin-top: 0;">📊 RESUMO EXECUTIVO</h3>
                            <table style="width: 100%;">
                                <tr><td><strong>💰 Total Recebido</strong></td><td class="positive">R$ ${dados.totalRecebido.toFixed(2)}</td></tr>
                                <tr><td><strong>📉 Total Despesas</strong></td><td class="negative">R$ ${dados.totalDespesas.toFixed(2)}</td></tr>
                                <tr><td><strong>💵 Saldo Final</strong></td><td class="${dados.saldo >= 0 ? 'positive' : 'negative'}">R$ ${dados.saldo.toFixed(2)}</td></tr>
                                <tr><td><strong>👥 Jogadores Pagos</strong></td><td>${dados.jogadoresPagos}/${dados.totalJogadores} (${dados.percentualPagos.toFixed(1)}%)</td></tr>
                            </table>
                        </div>
                        
                        <h2>📈 ANÁLISE DE RECEITAS</h2>
                        <table>
                            <thead><tr><th>Indicador</th><th>Valor</th></tr></thead>
                            <tbody>
                                <tr><td>Total de Jogadores</td><td>${dados.totalJogadores}</td></tr>
                                <tr><td>Mensalistas</td><td>${dados.jogadoresPorTipo?.mensal || 0}</td></tr>
                                <tr><td>Avulsos</td><td>${dados.jogadoresPorTipo?.avulso || 0}</td></tr>
                                <tr><td>Mensalistas Pagos</td><td>${dados.pagosPorTipo?.mensal || 0}</td></tr>
                                <tr><td>Avulsos Pagos</td><td>${dados.pagosPorTipo?.avulso || 0}</td></tr>
                            </tbody>
                        </table>
                        
                        ${Object.keys(dados.despesasPorCategoria).length > 0 ? `
                            <h2>💸 ANÁLISE DE DESPESAS</h2>
                            <table>
                                <thead><tr><th>Categoria</th><th>Valor</th></tr></thead>
                                <tbody>
                                    ${Object.entries(dados.despesasPorCategoria).map(([cat, valor]) => `
                                        <tr><td>${cat}</td><td class="negative">R$ ${valor.toFixed(2)}</td></tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : ''}
                        
                        ${dados.inadimplentes && dados.inadimplentes.length > 0 ? `
                            <h2>⚠️ INADIMPLENTES</h2>
                            <ul>
                                ${dados.inadimplentes.map(nome => `<li>${nome}</li>`).join('')}
                            </ul>
                        ` : ''}
                        
                        <div class="footer">
                            <p>Chave PIX: ${configuracoes.pixKey}</p>
                            <p>Relatório gerado automaticamente pelo Sistema de Gestão do Time</p>
                        </div>
                    </div>
                `;
                
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `relatorio_${configuracoes.nomeTime.replace(/\s/g, '_')}_${dados.periodo.replace(/\s/g, '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, letterRendering: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                setTimeout(async () => {
                    await html2pdf().set(opt).from(element).save();
                    setGerandoPDF(false);
                    alert("✅ PDF gerado com sucesso!");
                }, 100);
            };

            const enviarWhatsApp = () => {
                const dados = gerarRelatorio();
                const mensagem = configuracoes.mensagemRelatorio
                    .replace(/{nomeTime}/g, configuracoes.nomeTime)
                    .replace(/{periodo}/g, dados.periodo)
                    .replace(/{totalRecebido}/g, `R$ ${dados.totalRecebido.toFixed(2)}`)
                    .replace(/{totalDespesas}/g, `R$ ${dados.totalDespesas.toFixed(2)}`)
                    .replace(/{saldo}/g, `R$ ${dados.saldo.toFixed(2)}`)
                    .replace(/{pagos}/g, dados.jogadoresPagos)
                    .replace(/{totalJogadores}/g, dados.totalJogadores)
                    .replace(/{percentual}/g, dados.percentualPagos.toFixed(1));
                
                const telefone = configuracoes.telefoneAdmin;
                const url = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;
                window.open(url, '_blank');
            };

            // ========== FUNÇÕES DE RECEITAS ==========
            const adicionarJogador = (jogadorPreCadastrado = null) => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado! Não é possível adicionar jogadores.`, "error");
                    return;
                }
                
                let novoJogador;
                if (jogadorPreCadastrado) {
                    if (dadosAtuais.jogadores.some(j => j.nome === jogadorPreCadastrado.nome)) {
                        showMessage(`❌ ${jogadorPreCadastrado.nome} já está na lista deste mês!`, "error");
                        return;
                    }
                    novoJogador = {
                        id: Date.now(),
                        nome: jogadorPreCadastrado.nome,
                        telefone: jogadorPreCadastrado.telefone,
                        tipo: jogadorPreCadastrado.tipo,
                        pago: false,
                        dataPagamento: null,
                        ultimaCobranca: null
                    };
                } else {
                    if (!nome.trim()) {
                        showMessage("⚠️ Informe o nome do jogador", "error");
                        return;
                    }
                    novoJogador = {
                        id: Date.now(),
                        nome: nome.trim(),
                        telefone: telefone.trim(),
                        tipo,
                        pago: false,
                        dataPagamento: null,
                        ultimaCobranca: null
                    };
                }
                
                setDadosMensais(prev => ({
                    ...prev,
                    [currentKey]: {
                        ...prev[currentKey],
                        jogadores: [...(prev[currentKey]?.jogadores || []), novoJogador]
                    }
                }));
                
                setNome("");
                setTelefone("");
                showMessage(`✅ ${novoJogador.nome} adicionado em ${meses[mesSelecionado]}/${anoSelecionado}!`);
            };

            const adicionarTodosMensalistas = () => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado!`, "error");
                    return;
                }
                
                let adicionados = 0;
                MENSALISTAS_FIXOS.forEach(mensalista => {
                    if (!dadosAtuais.jogadores.some(j => j.nome === mensalista.nome)) {
                        const novoJogador = {
                            id: Date.now() + adicionados,
                            nome: mensalista.nome,
                            telefone: mensalista.telefone,
                            tipo: "mensal",
                            pago: false,
                            dataPagamento: null,
                            ultimaCobranca: null
                        };
                        setDadosMensais(prev => ({
                            ...prev,
                            [currentKey]: {
                                ...prev[currentKey],
                                jogadores: [...(prev[currentKey]?.jogadores || []), novoJogador]
                            }
                        }));
                        adicionados++;
                    }
                });
                
                showMessage(`✅ ${adicionados} mensalistas adicionados!`);
            };

            const togglePagamento = (id) => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado!`, "error");
                    return;
                }
                
                const lista = dadosAtuais.jogadores.map(j =>
                    j.id === id ? { ...j, pago: !j.pago, dataPagamento: !j.pago ? new Date().toLocaleDateString() : null } : j
                );
                setDadosMensais(prev => ({ ...prev, [currentKey]: { ...prev[currentKey], jogadores: lista } }));
                
                const jogador = dadosAtuais.jogadores.find(j => j.id === id);
                showMessage(`${jogador.nome} - ${!jogador.pago ? "✅ Pago" : "⏳ Pendente"}`);
            };

            const removerJogador = (id) => {
                if (dadosAtuais.fechado) {
                    showMessage(`⚠️ Mês fechado!`, "error");
                    return;
                }
                
                const jogador = dadosAtuais.jogadores.find(j => j.id === id);
                if (window.confirm(`Remover ${jogador.nome} da lista de ${meses[mesSelecionado]}/${anoSelecionado}?`)) {
                    setDadosMensais(prev => ({
                        ...prev,
                        [currentKey]: { ...prev[currentKey], jogadores: prev[currentKey].jogadores.filter(j => j.id !== id) }
                    }));
                    showMessage(`🗑️ ${jogador.nome} removido`);
                }
            };

            const atualizarTelefone = (id, novoTelefone) => {
                if (dadosAtuais.fechado) return;
                setDadosMensais(prev => ({
                    ...prev,
                    [currentKey]: {
                        ...prev[currentKey],
                        jogadores: prev[currentKey].jogadores.map(j => j.id === id ? { ...j, telefone: novoTelefone } : j)
                    }
                }));
            };

            // ========== FUNÇÕES DE COBRANÇA ==========
            const formatarTelefone = (telefone) => {
                let numero = telefone.replace(/\D/g, '');
                if (numero.length === 10) numero = '55' + numero;
                if (numero.length === 11 && !numero.startsWith('55')) numero = '55' + numero;
                return numero;
            };

            const enviarCobrancaMensal = (jogador) => {
                if (!jogador.telefone) {
                    showMessage(`⚠️ ${jogador.nome} não tem telefone!`, "error");
                    return false;
                }
                const mensagem = configuracoes.mensagemCobranca
                    .replace(/{nome}/g, jogador.nome)
                    .replace(/{nomeTime}/g, configuracoes.nomeTime)
                    .replace(/{mes}/g, meses[mesSelecionado])

                                            jogadoresFiltrados.map((j) => (
                                                <div key={j.id} className="p-4 hover:bg-gray-50">
                                                    <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className="font-semibold text-gray-800">{j.nome}</span>
                                                                <span className={`text-xs px-2 py-1 rounded-full ${j.tipo === "mensal" ? "bg-blue-100 text-blue-700" : "bg-purple-100 text-purple-700"}`}>
                                                                    {j.tipo === "mensal" ? "Mensalista" : "Avulso"}
                                                                </span>
                                                                <span className="text-sm text-gray-600">
                                                                    R$ {j.tipo === "mensal" ? configuracoes.valorMensal : configuracoes.valorAvulso}
                                                                </span>
                                                                {j.telefone ? (
                                                                    <span className="text-xs text-green-600">📱 {j.telefone}</span>
                                                                ) : (
                                                                    <span className="text-xs text-red-400">⚠️ Sem telefone</span>
                                                                )}
                                                                {j.dataPagamento && (
                                                                    <span className="text-xs text-gray-400">🗓️ Pago em {j.dataPagamento}</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <input 
                                                                type="text" 
                                                                placeholder="Telefone" 
                                                                value={j.telefone || ""} 
                                                                onChange={(e) => atualizarTelefone(j.id, e.target.value)} 
                                                                className="px-2 py-1 text-sm border rounded w-32"
                                                                disabled={dadosAtuais.fechado}
                                                            />
                                                            <button onClick={() => removerJogador(j.id)} disabled={dadosAtuais.fechado} className="px-3 py-1 bg-red-500 text-white rounded text-sm disabled:opacity-50">🗑️</button>
                                                            {!j.pago && j.tipo === "mensal" && (
                                                                <button onClick={() => enviarCobrancaMensal(j)} className="px-3 py-1 bg-green-500 text-white rounded text-sm">📱 Cobrar</button>
                                                            )}
                                                            {!j.pago && j.tipo === "avulso" && (
                                                                <button onClick={() => enviarCobrancaAvulso(j)} className="px-3 py-1 bg-orange-500 text-white rounded text-sm">📱 Cobrar</button>
                                                            )}
                                                            <button onClick={() => togglePagamento(j.id)} disabled={dadosAtuais.fechado} className={`px-3 py-1 rounded text-sm ${j.pago ? "bg-green-500 text-white" : "bg-gray-200"} disabled:opacity-50`}>
                                                                {j.pago ? "Pago" : "Pendente"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </>
                        )}

                        {/* Conteúdo Despesas */}
                        {abaAtiva === "despesas" && (
                            <>
                                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8">
                                    <h2 className="text-xl font-semibold mb-4">💸 Adicionar Despesa</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                        <input type="text" placeholder="Nome" value={novaDespesa.nome} onChange={(e) => setNovaDespesa({...novaDespesa, nome: e.target.value})} className="px-4 py-2 border rounded-lg" disabled={dadosAtuais.fechado} />
                                        <input type="number" placeholder="Valor" value={novaDespesa.valor} onChange={(e) => setNovaDespesa({...novaDespesa, valor: e.target.value})} className="px-4 py-2 border rounded-lg" disabled={dadosAtuais.fechado} />
                                        <select value={novaDespesa.categoria} onChange={(e) => setNovaDespesa({...novaDespesa, categoria: e.target.value})} className="px-4 py-2 border rounded-lg" disabled={dadosAtuais.fechado}>
                                            <option value="estrutura">🏟️ Locação da Quadra</option>
                                            <option value="serviços">🧤 Goleiro</option>
                                            <option value="manutenção">👕 Lavagem Uniforme</option>
                                            <option value="outros">📝 Outros</option>
                                        </select>
                                        <button onClick={adicionarDespesa} disabled={dadosAtuais.fechado} className="px-6 py-2 bg-gradient-to-r from-red-600 to-orange-600 text-white rounded-lg disabled:opacity-50">Adicionar</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8">
                                    <div className="flex gap-2">
                                        <button onClick={() => setFiltroDespesa("todas")} className={`px-3 py-1 rounded ${filtroDespesa === "todas" ? "bg-blue-600 text-white" : "bg-gray-100"}`}>Todas</button>
                                        <button onClick={() => setFiltroDespesa("pagas")} className={`px-3 py-1 rounded ${filtroDespesa === "pagas" ? "bg-green-600 text-white" : "bg-gray-100"}`}>Pagas</button>
                                        <button onClick={() => setFiltroDespesa("pendentes")} className={`px-3 py-1 rounded ${filtroDespesa === "pendentes" ? "bg-orange-600 text-white" : "bg-gray-100"}`}>Pendentes</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg overflow-hidden">
                                    <div className="bg-gradient-to-r from-red-600 to-orange-600 px-6 py-4">
                                        <h2 className="text-xl font-semibold text-white">📋 Despesas</h2>
                                    </div>
                                    <div className="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                                        {despesasFiltradas.length === 0 ? (
                                            <div className="text-center py-12"><p className="text-gray-400">Nenhuma despesa</p></div>
                                        ) : (
                                            despesasFiltradas.map((d) => (
                                                <div key={d.id} className="p-4 hover:bg-gray-50">
                                                    <div className="flex justify-between items-center flex-wrap gap-2">
                                                        <div>
                                                            <span className="font-semibold">{d.nome}</span>
                                                            <span className="text-xs ml-2 px-2 py-1 rounded-full bg-gray-100">{categorias[d.categoria]}</span>
                                                            <span className="text-sm ml-2 text-red-600 font-bold">R$ {d.valor}</span>
                                                            {d.dataPagamento && <span className="text-xs ml-2 text-green-600">✅ {d.dataPagamento}</span>}
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => removerDespesa(d.id)} disabled={dadosAtuais.fechado} className="px-3 py-1 bg-red-500 text-white rounded text-sm disabled:opacity-50">🗑️</button>
                                                            <button onClick={() => togglePagamentoDespesa(d.id)} disabled={dadosAtuais.fechado} className={`px-3 py-1 rounded text-sm ${d.pago ? "bg-green-500 text-white" : "bg-gray-200"} disabled:opacity-50`}>
                                                                {d.pago ? "Paga" : "Pendente"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </>
                        )}

                        <div className="mt-8 text-center text-sm text-gray-400">
                            <p>💡 Dados salvos automaticamente | 📊 Gere relatórios em PDF | 📱 Compartilhe via WhatsApp</p>
                            <p className="mt-1">👥 {MENSALISTAS_FIXOS.length} Mensalistas Fixos | {AVULSOS_ROTINEIROS.length} Avulsos Rotineiros</p>
                        </div>
                    </div>

                    {mostrarConfig && <ModalConfiguracoes />}
                    {mostrarRelatorio && <ModalRelatorio />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
